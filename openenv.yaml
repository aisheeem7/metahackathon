name: personal-expense-optimizer
version: 1.0.0
author: "Smart Spend Team"
license: MIT
description: |
  Real-world task of personal budget optimization and smart spending decisions.
  Agent must allocate monthly ₹50,000 budget across 5 expense categories
  and make spending decisions to meet savings goals while staying within limits.
  
  Simulates realistic transaction patterns from SMS banking data.
  Episodes run for 30 days (1 calendar month).

motivation: |
  Personal finance management is a critical life skill. Many individuals struggle
  with budget allocation, impulse spending, and long-term savings goals.
  This environment provides a realistic simulation for training and evaluating
  agents that can help optimize household spending patterns.

task_type: resource_allocation
domain: personal_finance
difficulty_range: [easy, medium, hard]

action_space:
  type: ActionType
  description: "Agent actions for budget management"
  action_types:
    - name: allocate_budget
      description: "Set total monthly budget allocation"
      parameters:
        - amount (float): Total budget in INR (₹)
        
    - name: adjust_category
      description: "Set budget limit for specific expense category"
      parameters:
        - category (str): One of [Food & Dining, Transport, Shopping, Health, Bills]
        - amount (float): Category budget in INR
        
    - name: set_savings_goal
      description: "Set target monthly savings percentage"
      parameters:
        - amount (float): Savings goal as percentage (0-50)
        
    - name: defer_expense
      description: "Defer a discretionary expense to next month"
      parameters: []

observation_space:
  type: Observation
  description: "Full state information for the agent"
  fields:
    - day (int): Current day of month [1-30]
    - total_balance (float): Remaining monthly budget in INR
    - category_budgets (Dict[str, float]): Allocated budget per category
    - category_spent (Dict[str, float]): Amount spent per category
    - category_remaining (Dict[str, float]): Remaining budget per category
    - recent_transactions (List[Transaction]): Last 5 transactions
    - pending_transaction (Transaction): Current transaction to approve/defer
    - monthly_income (float): Total monthly income in INR
    - savings_goal_percentage (float): Target savings as % of income
    - current_savings (float): Amount saved so far (₹)
    - projected_savings (float): Estimated final savings
    - days_on_budget (int): Days stayed within all category limits
    - overspend_count (int): Times exceeded category budget

reward_space:
  type: Reward
  range: [-1.0, 1.0]
  description: "Detailed multi-component reward for learning"
  components:
    - budget_adherence: Staying within category limits [-1.0, 1.0]
    - savings_progress: Meeting savings goal [-1.0, 1.0]
    - category_balance: Diverse spending across categories [-1.0, 1.0]
    - transaction_decision: Smart approval/deferral decisions [-1.0, 1.0]
    - overspend_penalty: Penalty for exceeding limits [≤0]

episode_length: 30  # days per month
max_episode_steps: 30
default_monthly_income: 50000  # INR
categories: [Food & Dining, Transport, Shopping, Health, Bills]

tasks:
  - task_id: budget_adherence_easy
    difficulty: easy
    description: |
      Stay within 10% of daily budget for at least 7 days in a 30-day month.
      Default 20% savings goal. Simple task to test basic budget tracking.
    success_criteria:
      days_on_budget_minimum: 7
      budget_overrun_tolerance: 0.10
      expected_difficulty: Basic constraint satisfaction
    
  - task_id: category_optimization_medium
    difficulty: medium
    description: |
      Allocate budget optimally across 5 categories AND reduce overall
      spending by 15% vs baseline while maintaining quality of life.
      Must stay within limits for 20+ days. Savings goal: 20%.
    success_criteria:
      days_on_budget_minimum: 20
      spending_reduction: 0.15
      savings_rate_target: 0.20
      category_balance_score: 0.7
      expected_difficulty: Multi-objective optimization with tradeoffs
    
  - task_id: predictive_budgeting_hard
    difficulty: hard
    description: |
      Predict next month's expenses based on patterns, create zero-based
      budget allocations, AND achieve 25% savings. Must defer discretionary
      expenses strategically and balance savings with lifestyle quality.
      Requires advanced forecasting and decision making.
    success_criteria:
      savings_rate_target: 0.25
      days_on_budget_minimum: 25
      forecast_accuracy_minimum: 0.80
      deferred_expenses_count_minimum: 5
      expected_difficulty: Requires model of spending patterns + planning

grader: |
  Each task includes a deterministic grader that scores 0.0-1.0:
  - Easy: Binary check (days_on_budget >= threshold)
  - Medium: Multi-criteria (days, spending reduction, balance)
  - Hard: Advanced metrics (forecast accuracy, deferred vs approved ratio)
  
  Graders are reproducible with fixed random seed.

metadata:
  created_date: "2026-04-08"
  environment_class: "PersonalExpenseOptimizer"
  module_path: "env.finance_env"
  openenv_version: "1.0.0"
  
features:
  - Realistic SMS transaction simulation
  - Multi-category budget tracking
  - Partial progress reward signals
  - Discretionary/essential expense distinction
  - Deferred expense tracking
  - Reproducible with random seed

requirements:
  - python >= 3.8
  - pydantic >= 2.0
  - numpy (optional, for advanced analysis)
  
publish_info:
  huggingface_space: "username/personal-expense-optimizer"
  docker_image: "personal-expense-optimizer:latest"

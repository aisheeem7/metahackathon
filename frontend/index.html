<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Spend – Personal Finance Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    header { background: #1e293b; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; border-bottom: 1px solid #334155; }
    header h1 { font-size: 1.5rem; color: #38bdf8; }
    header span { background: #0ea5e9; color: #fff; font-size: 0.75rem; padding: 2px 8px; border-radius: 9999px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; padding: 1.5rem 2rem; }
    .card { background: #1e293b; border-radius: 12px; padding: 1.25rem; border: 1px solid #334155; }
    .card h2 { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; margin-bottom: .5rem; }
    .card .value { font-size: 1.8rem; font-weight: 700; color: #f1f5f9; }
    .card .value.green { color: #4ade80; }
    .card .value.yellow { color: #facc15; }
    .card .value.red { color: #f87171; }
    .section { padding: 0 2rem 1.5rem; }
    .section h3 { font-size: 1rem; color: #94a3b8; margin-bottom: 1rem; }
    .chart-wrap { background: #1e293b; border-radius: 12px; padding: 1.25rem; border: 1px solid #334155; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; color: #64748b; font-weight: 600; padding: .5rem .75rem; border-bottom: 1px solid #334155; }
    td { padding: .5rem .75rem; border-bottom: 1px solid #1e293b; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 9999px; font-size: .75rem; font-weight: 600; }
    .badge.easy { background:#064e3b; color:#4ade80; }
    .badge.medium { background:#422006; color:#fbbf24; }
    .badge.hard { background:#450a0a; color:#f87171; }
    button { cursor: pointer; border: none; border-radius: 8px; padding: .5rem 1.25rem; font-size: .875rem; font-weight: 600; transition: opacity .2s; }
    button:hover { opacity: .85; }
    .btn-primary { background: #0ea5e9; color: #fff; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .actions-row { display: flex; gap: .75rem; flex-wrap: wrap; padding: 0 2rem 1.5rem; }
    #log { background: #0f172a; border: 1px solid #334155; border-radius: 8px; font-family: monospace; font-size: .8rem; padding: 1rem; max-height: 200px; overflow-y: auto; color: #94a3b8; }
  </style>
</head>
<body>
  <header>
    <h1>💸 Smart Spend</h1>
    <span>OpenEnv v1.0</span>
  </header>

  <div class="grid">
    <div class="card"><h2>Day</h2><div class="value" id="val-day">—</div></div>
    <div class="card"><h2>Balance (₹)</h2><div class="value green" id="val-balance">—</div></div>
    <div class="card"><h2>Total Spent (₹)</h2><div class="value yellow" id="val-spent">—</div></div>
    <div class="card"><h2>Savings Rate</h2><div class="value" id="val-savings">—</div></div>
  </div>

  <div class="actions-row">
    <button class="btn-primary" onclick="resetEnv()">⟳ Reset</button>
    <button class="btn-secondary" onclick="stepEnv()">▶ Step (Auto Action)</button>
    <button class="btn-secondary" onclick="gradeAll()">🏆 Grade All Tasks</button>
  </div>

  <div class="section">
    <h3>Category Budget vs Spent</h3>
    <div class="chart-wrap"><canvas id="barChart" height="90"></canvas></div>
  </div>

  <div class="section">
    <h3>Task Scores</h3>
    <div class="card">
      <table>
        <thead><tr><th>Task</th><th>Difficulty</th><th>Score</th></tr></thead>
        <tbody id="task-table"><tr><td colspan="3" style="color:#475569">Click "Grade All Tasks" to evaluate.</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="section">
    <h3>Activity Log</h3>
    <div id="log">Ready. Click Reset to begin.</div>
  </div>

  <script>
    const BASE = "";
    let barChart;

    async function api(path, method = "GET", body = null) {
      const opts = { method, headers: { "Content-Type": "application/json" } };
      if (body) opts.body = JSON.stringify(body);
      const r = await fetch(BASE + path, opts);
      return r.json();
    }

    function fmt(n) { return "₹" + Number(n).toLocaleString("en-IN", { maximumFractionDigits: 0 }); }

    function logMsg(msg) {
      const el = document.getElementById("log");
      el.textContent = new Date().toLocaleTimeString() + " – " + msg + "\n" + el.textContent;
    }

    function updateUI(obs) {
      document.getElementById("val-day").textContent = obs.day + " / 30";
      document.getElementById("val-balance").textContent = fmt(obs.total_balance);
      const spent = Object.values(obs.category_spent).reduce((a, b) => a + b, 0);
      document.getElementById("val-spent").textContent = fmt(spent);
      const rate = ((obs.monthly_income - spent) / obs.monthly_income * 100).toFixed(1);
      const savEl = document.getElementById("val-savings");
      savEl.textContent = rate + "%";
      savEl.className = "value " + (rate >= 20 ? "green" : rate >= 10 ? "yellow" : "red");

      const cats = Object.keys(obs.category_budgets);
      const budgets = cats.map(c => obs.category_budgets[c]);
      const spents = cats.map(c => obs.category_spent[c] || 0);

      if (!barChart) {
        barChart = new Chart(document.getElementById("barChart"), {
          type: "bar",
          data: {
            labels: cats,
            datasets: [
              { label: "Budget", data: budgets, backgroundColor: "#0ea5e933", borderColor: "#0ea5e9", borderWidth: 2 },
              { label: "Spent",  data: spents,  backgroundColor: "#f8717155", borderColor: "#f87171", borderWidth: 2 },
            ]
          },
          options: {
            responsive: true,
            plugins: { legend: { labels: { color: "#94a3b8" } } },
            scales: {
              x: { ticks: { color: "#94a3b8" }, grid: { color: "#1e293b" } },
              y: { ticks: { color: "#94a3b8", callback: v => "₹" + v.toLocaleString("en-IN") }, grid: { color: "#334155" } }
            }
          }
        });
      } else {
        barChart.data.datasets[0].data = budgets;
        barChart.data.datasets[1].data = spents;
        barChart.update();
      }
    }

    async function resetEnv() {
      const d = await api("/api/env/reset", "POST");
      updateUI(d.observation);
      logMsg("Environment reset. Day 1 of 30 started.");
    }

    async function stepEnv() {
      const state = await api("/api/env/state");
      // Simple heuristic auto-action: adjust most over-budget category
      const budgets = state.category_budgets;
      const spent = state.category_spent;
      let worst = null, worstRatio = 0;
      for (const [cat, budget] of Object.entries(budgets)) {
        const ratio = (spent[cat] || 0) / (budget || 1);
        if (ratio > worstRatio) { worstRatio = ratio; worst = cat; }
      }
      const action = worst
        ? { action_type: "adjust_category", category: worst, amount: -500 }
        : { action_type: "set_savings_goal", amount: 0.22 };

      const d = await api("/api/env/step", "POST", action);
      updateUI(d.observation);
      logMsg(`Step → action: ${action.action_type} (${action.category || ""}) | reward: ${d.reward.total.toFixed(4)} | done: ${d.done}`);
    }

    async function gradeAll() {
      const tasks = ["budget_adherence_easy", "category_optimization_medium", "predictive_budgeting_hard"];
      const tbody = document.getElementById("task-table");
      tbody.innerHTML = "";
      for (const t of tasks) {
        const r = await api(`/api/tasks/${t}/grade`, "POST");
        const bar = Math.round(r.score * 100);
        tbody.innerHTML += `<tr>
          <td>${t.replace(/_/g, " ")}</td>
          <td><span class="badge ${r.difficulty}">${r.difficulty}</span></td>
          <td>
            <div style="display:flex;align-items:center;gap:.5rem">
              <div style="background:#334155;border-radius:4px;width:120px;height:8px;overflow:hidden">
                <div style="background:#0ea5e9;width:${bar}%;height:100%"></div>
              </div>
              <span>${(r.score * 100).toFixed(1)}%</span>
            </div>
          </td>
        </tr>`;
        logMsg(`Grade [${t}]: ${r.score.toFixed(4)}`);
      }
    }

    // Auto-load state on page open
    resetEnv();
  </script>
</body>
</html>

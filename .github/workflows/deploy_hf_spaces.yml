name: Deploy to HuggingFace Spaces

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      
      - name: Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          
          # Clone HF Space
          git clone https://huggingface.co/spaces/${{ secrets.HF_SPACE_ID }} hf_spaces
          
          # Copy files
          cp -r env/ hf_spaces/
          cp -r backend/ hf_spaces/
          cp -r scripts/ hf_spaces/
          cp openenv.yaml hf_spaces/
          cp Dockerfile hf_spaces/
          cp requirements.txt hf_spaces/
          cp app.py hf_spaces/
          cp README.md hf_spaces/
          
          # Push
          cd hf_spaces
          git add .
          git commit -m "Update from main branch $(date)"
          git push https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${{ secrets.HF_SPACE_ID }} main
